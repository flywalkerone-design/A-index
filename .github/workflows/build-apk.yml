name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip and copy web files to assets
        run: |
          unzip 温度计APP.zip -d 温度计APP
          mkdir -p 温度计APP/android/app/src/main/assets/www/js
          cp -r 温度计APP/www/* 温度计APP/android/app/src/main/assets/www/

      - name: Generate Gradle Wrapper
        working-directory: 温度计APP/android
        run: gradle wrapper --gradle-version 8.5

      - name: Build Release APK
        working-directory: 温度计APP/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A-stock-Thermometer
          path: 温度计APP/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
