name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and prepare project
        run: |
          ANDROID_DIR=$(find . -name "build.gradle.kts" -path "*/android/*" -exec dirname {} \; | head -1 | sed 's|/app$||')
          echo "Found android dir: $ANDROID_DIR"
          WWW_DIR=$(find . -name "index.html" -path "*/www/*" ! -path "*/assets/*" -exec dirname {} \; | head -1)
          echo "Found www dir: $WWW_DIR"
          mkdir -p "$ANDROID_DIR/app/src/main/assets/www/js"
          cp -r "$WWW_DIR"/* "$ANDROID_DIR/app/src/main/assets/www/"
          echo "ANDROID_DIR=$ANDROID_DIR" >> $GITHUB_ENV

      - name: Generate Gradle Wrapper
        run: |
          cd "$ANDROID_DIR"
          gradle wrapper --gradle-version 8.5

      - name: Build Release APK
        run: |
          cd "$ANDROID_DIR"
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A-stock-Thermometer
          path: ${{ env.ANDROID_DIR }}/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
